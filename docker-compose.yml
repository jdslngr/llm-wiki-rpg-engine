# One command — `docker compose up` — brings up the app + a local Postgres.
#
# Phase 2: the app now USES this database. DATABASE_URL (below) points the server at
# the `db` service, so playthroughs persist across restarts. Without DATABASE_URL the
# server falls back to an in-memory store (used by plain `npm run dev`).

services:
  app:
    build: .
    ports:
      - "3001:3001"
    # Inject the AI provider settings (incl. your key) at runtime — the key is
    # never baked into the image. Reads server/.env.
    env_file:
      - ./server/.env
    environment:
      PORT: "3001"
      DATABASE_URL: "postgres://archipelago:archipelago@db:5432/archipelago"
      ART_DIR: "/app/server/data/art"
    volumes:
      - artdata:/app/server/data/art
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: archipelago
      POSTGRES_PASSWORD: archipelago
      POSTGRES_DB: archipelago
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archipelago"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  artdata:
